<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Library</title>
  <link rel="stylesheet" href="/src/styles/style.css">
</head>
<body>

  <!-- ── Header ── -->
  <!-- Logo icon + app name and tagline -->
  <div class="title-header">
    <div class="book-icon-container">
      <a href="./index.html"><img src="./assets/book.svg" class="book-icon" alt="Book-Icon"></a>
    </div>
    
    <div class="header-title-text">
      <h3>The Library</h3>
      <p>Discover your next favorite book</p>
    </div>
  </div>

  <main>

    <!-- ── Hero Section ── -->
    <!-- Title, subtitle and search bar -->
    <div class="title-body">
      <h1>Discover Your Next Great Read</h1>
      <p>Search millions of books, build your personal library, and never lose track of what to read next.</p>

      <!-- Search bar: icon + input + button -->
      <div class="search-input-container">
        <div class="search-icon-container">
          <img src="./assets/search.svg" class="search-icon" alt="Search icon">
          <input type="text" class="search-input-bar" id="searchInput" placeholder="Search for books by title or author...">
        </div>
        <button class="search-btn" id="searchBtn">Search</button> 
      </div>

      <!-- Loading / error status message — updated by JS -->
      <p id="status"></p>
    </div>

    <!-- ── Main Content: Grid + Favorites Sidebar ── -->
    <div class="content-wrapper">

      <!-- Book results grid — populated by JS after search -->
      <section class="grid-container" id="results"></section>

      <!-- ── Favorites Sidebar ── -->
      <nav class="favorites-container">

        <!-- Sidebar header: heart icon + title + count -->
        <div class="favorites-header">
          <div class="favorites-header-icon">
            <img src="./assets/heart.svg" alt="Heart-icon">
          </div>
          <div>
            <h5>Favorites</h5>
            <!-- Count updated by JS -->
            <p id="favoritesCount">0 books saved</p>
          </div>
        </div>

        <!-- Favorite book items — populated by JS -->
        <div class="favorite-books" id="favorites"></div>

      </nav>
    </div>

  </main>

  <!-- ── Footer ── -->
  <footer class="footer">
    <p>Powered by <a href="https://openlibrary.org" target="_blank" class="footer-link-text">Open Library</a></p>
  </footer>

  <!-- Main JavaScript -->
  <script type="module" src="/src/main.js"></script>

</body>
</html>
